<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ruta360 – Unidad 2 & 3: My World + Routines</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');
:root{--brand:#10B981;--dark:#059669;--light:#10B98122;--mid:#10B98144;--bg:#0F1117;--s1:#1A1D27;--s2:#22263A;--s3:#2C3050;--txt:#E8EAF6;--muted:#8892B0;--dim:#4A5578;--ok:#22C55E;--err:#EF4444;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:256px;background:var(--s1);border-right:1px solid var(--s3);display:flex;flex-direction:column;z-index:100;overflow:hidden;}
.sh{padding:18px 16px 14px;background:linear-gradient(135deg,var(--dark),var(--brand));flex-shrink:0;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;}
.plbl{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px;line-height:1.3;}
.prog{margin-top:9px;background:rgba(255,255,255,.2);border-radius:99px;height:4px;overflow:hidden;}
.pf{height:100%;background:#fff;border-radius:99px;transition:width .4s;}
.pl{font-size:11px;color:rgba(255,255,255,.8);margin-top:4px;}
.ll{flex:1;overflow-y:auto;padding:6px 0;}
.ll::-webkit-scrollbar{width:4px;}.ll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:99px;}
.li{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;}
.li:hover{background:var(--s2)}.li.active{background:var(--light);border-left-color:var(--brand);}
.ln{width:26px;height:26px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;}
.li.active .ln{background:var(--brand);color:#fff;}.li.done .ln{background:var(--ok);color:#fff;}
.li.ckpt .ln{background:linear-gradient(135deg,#F59E0B,#F97316);color:#fff;}
.lt{font-size:12px;color:var(--muted);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li.active .lt{color:var(--txt);}
.nav-links{padding:10px 14px;border-top:1px solid var(--s3);display:flex;gap:6px;flex-wrap:wrap;}
.nav-a{font-size:11px;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:5px;border:1px solid var(--s3);transition:all .15s;}
.nav-a:hover{border-color:var(--brand);color:var(--brand);}
.main{margin-left:256px;flex:1;}
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--s2);padding:11px 26px;display:flex;align-items:center;gap:10px;}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--s3);background:var(--s1);color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand);}.btn:disabled{opacity:.3;cursor:not-allowed;}
.tts{padding:6px 11px;border-radius:7px;background:var(--s1);border:1px solid var(--s3);color:var(--muted);font-size:17px;cursor:pointer;transition:all .15s;line-height:1;}
.tts:hover{border-color:var(--brand);color:var(--brand);}
.badge{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;color:var(--brand);background:var(--light);padding:4px 11px;border-radius:99px;}
.content{padding:26px 30px 56px;max-width:840px;}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);background:var(--light);padding:3px 10px;border-radius:99px;margin-bottom:9px;}
h1.t{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--txt);line-height:1.2;letter-spacing:-.4px;}
.obj{margin-top:7px;font-size:14px;color:var(--muted);line-height:1.5;}.lh{margin-bottom:22px;}
.sec{background:var(--s1);border-radius:13px;border:1px solid var(--s2);margin-bottom:16px;overflow:hidden;}
.sh2{padding:13px 18px 11px;border-bottom:1px solid var(--s2);display:flex;align-items:center;gap:9px;cursor:pointer;}
.sico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--light);}
.slbl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--txt);}
.stog{margin-left:auto;color:var(--dim);font-size:11px;}
.sbody{padding:16px 18px;}.sbody.col{display:none;}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;}
.vc{background:var(--s2);border-radius:7px;padding:9px 12px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.vc:hover{border-color:var(--brand);background:var(--light);}
.ven{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--txt);}
.ves{font-size:11px;color:var(--muted);}.vsic{font-size:9px;color:var(--brand);margin-top:2px;}
.grule{background:linear-gradient(135deg,var(--light),var(--mid));border-left:3px solid var(--brand);border-radius:7px;padding:13px 15px;margin-bottom:13px;}
.grl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);margin-bottom:3px;}
.grt{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--txt);}
.el{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ei{display:flex;align-items:center;gap:9px;background:var(--s2);border-radius:7px;padding:8px 13px;font-size:13px;color:var(--txt);}
.edot{color:var(--brand);font-size:14px;}.esp{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px;}
.esp:hover{color:var(--brand);}
.ex{background:var(--s2);border-radius:13px;padding:16px;margin-bottom:12px;border:1px solid var(--s3);}
.ex.ok{border-color:var(--ok);background:#052012;}.ex.no{border-color:var(--err);background:#1a0505;}
.exn{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.exq{font-size:14px;font-weight:500;color:var(--txt);margin-bottom:12px;line-height:1.4;}
.opts{display:flex;flex-direction:column;gap:7px;}
.ob{padding:9px 14px;background:var(--s3);border:1px solid transparent;border-radius:7px;color:var(--txt);font-size:13px;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.ob:hover:not(:disabled){border-color:var(--brand);background:var(--light);}.ob.ca{background:#052012;border-color:var(--ok);color:var(--ok);}.ob.wa{background:#1a0505;border-color:var(--err);color:var(--err);}
.fw{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.fi{padding:8px 13px;background:var(--s3);border:1px solid var(--dim);border-radius:7px;color:var(--txt);font-size:13px;outline:none;min-width:170px;font-family:'DM Sans',sans-serif;transition:border-color .15s;}
.fi:focus{border-color:var(--brand);}.fi.ok{border-color:var(--ok);background:#052012;color:var(--ok);}.fi.no{border-color:var(--err);background:#1a0505;}
.fh{font-size:11px;color:var(--dim);font-style:italic;margin-top:5px;}
.cb{padding:8px 18px;border-radius:7px;background:var(--brand);border:none;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.cb:hover{filter:brightness(1.15);}
.fb{margin-top:9px;font-size:12px;font-weight:500;display:none;}.fb.show{display:block;}.fb.ok{color:var(--ok);}.fb.no{color:var(--err);}
.spg{display:flex;flex-direction:column;gap:7px;}
.spr{display:flex;align-items:center;gap:11px;background:var(--s2);border-radius:7px;padding:11px 14px;}
.spt{flex:1;font-size:14px;color:var(--txt);line-height:1.4;}
.spb{background:var(--light);border:1px solid var(--brand);border-radius:7px;padding:7px 13px;color:var(--brand);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Space Grotesk',sans-serif;transition:all .15s;}
.spb:hover,.spb.pl{background:var(--brand);color:#fff;}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}.spb.pl{animation:pulse 1s infinite;}
.tip{background:linear-gradient(135deg,#1a1100,#251a00);border:1px solid #F59E0B44;border-left:3px solid #F59E0B;border-radius:13px;padding:13px 16px;display:flex;gap:11px;align-items:flex-start;}
.tipico{font-size:17px;flex-shrink:0;}.tiptxt{font-size:13px;color:#FCD34D;line-height:1.5;}
.sbar{background:var(--s1);border:1px solid var(--s2);border-radius:13px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.slb{font-size:12px;color:var(--muted);}.sv{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--brand);}
.st{flex:1;height:5px;background:var(--s2);border-radius:99px;overflow:hidden;}.sf{height:100%;background:var(--brand);border-radius:99px;transition:width .5s;}
.rst{background:none;border:1px solid var(--s3);border-radius:6px;padding:4px 11px;color:var(--muted);font-size:11px;cursor:pointer;}
.rst:hover{border-color:var(--err);color:var(--err);}
@media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}.content{padding:16px 14px 40px;}.vg{grid-template-columns:1fr 1fr;}}
</style>

<script>
const LS=[{"n":11,"phase":1,"title":"Months of the Year","obj":"Say all 12 months and identify their order.","vocab":[["January","Enero"],["February","Febrero"],["March","Marzo"],["April","Abril"],["May","Mayo"],["June","Junio"],["July","Julio"],["August","Agosto"],["September","Septiembre"],["October","Octubre"],["November","Noviembre"],["December","Diciembre"]],"grammar":{"rule":"'My birthday is in ___.'","examples":["My birthday is in March.","Christmas is in December.","School starts in August."]},"exercises":[{"type":"quiz","q":"Which month comes after July?","opts":["June","September","August","October"],"ans":2},{"type":"fill","q":"January, February, ___, April","blank":"March","hint":"The 3rd month of the year"},{"type":"quiz","q":"In which month is Christmas?","opts":["November","January","October","December"],"ans":3},{"type":"fill","q":"My birthday is ___ July.","blank":"in","hint":"We say 'in' with months"}],"tip":"Months always start with a CAPITAL letter in English: January, February…","speak":["January, February, March","April, May, June","July, August, September","October, November, December!"]},{"n":12,"phase":1,"title":"Telling Time – O'Clock","obj":"Read and say times on the hour.","vocab":[["O'clock","En punto"],["Hour","Hora"],["Minute","Minuto"],["Clock","Reloj"],["Time","Tiempo/Hora"],["What time is it?","¿Qué hora es?"],["Morning","Mañana"],["Afternoon","Tarde"],["Night","Noche"],["AM / PM","AM / PM"]],"grammar":{"rule":"'It is ___ o'clock.'","examples":["It is three o'clock.","What time is it? It is seven o'clock.","School starts at eight o'clock."]},"exercises":[{"type":"quiz","q":"How do you ask for the time?","opts":["What day is it?","What time is it?","How are you?","Where is it?"],"ans":1},{"type":"fill","q":"It is five ___.","blank":"o'clock","hint":"The word we use to tell time on the hour"},{"type":"quiz","q":"If it is 9:00, you say 'It is nine ___'","opts":["minutes","hours","o'clock","time"],"ans":2},{"type":"fill","q":"School starts at ___ o'clock. (common school start time)","blank":"eight","hint":"Most schools start at 8"}],"tip":"AM = morning (12:00am to 11:59am). PM = afternoon/evening (12:00pm to 11:59pm).","speak":["What time is it?","It is seven o'clock.","I wake up at six o'clock.","School ends at three o'clock."]},{"n":13,"phase":1,"title":"My Body","obj":"Name 10 body parts.","vocab":[["Head","Cabeza"],["Eyes","Ojos"],["Ears","Orejas"],["Nose","Nariz"],["Mouth","Boca"],["Hands","Manos"],["Arms","Brazos"],["Legs","Piernas"],["Feet","Pies"],["Fingers","Dedos"]],"grammar":{"rule":"'I have two ___s.' / 'Touch your ___.'","examples":["I have two eyes.","Touch your nose!","My hands are cold.","I have ten fingers."]},"exercises":[{"type":"quiz","q":"What do you use to hear?","opts":["eyes","mouth","ears","nose"],"ans":2},{"type":"fill","q":"I have two ___. (you walk with them)","blank":"legs","hint":"You use these to walk and run"},{"type":"quiz","q":"How many fingers do humans have in total?","opts":["8","12","10","6"],"ans":2},{"type":"fill","q":"I see with my ___.","blank":"eyes","hint":"The organs of vision"}],"tip":"Most body parts are REGULAR plurals: hand → hands, arm → arms. But 'foot' → 'feet' is irregular!","speak":["Touch your head!","I have two eyes.","My nose is small.","Hands up!"]},{"n":14,"phase":1,"title":"Food I Like","obj":"Name 12 foods and express preferences.","vocab":[["Apple","Manzana"],["Banana","Banano"],["Rice","Arroz"],["Bread","Pan"],["Chicken","Pollo"],["Water","Agua"],["Milk","Leche"],["Juice","Jugo"],["Pizza","Pizza"],["Salad","Ensalada"],["Egg","Huevo"],["Sandwich","Sándwich"]],"grammar":{"rule":"'I like ___.' / 'I don't like ___.'","examples":["I like pizza.","I don't like salad.","Do you like chicken?","Yes, I love it!"]},"exercises":[{"type":"quiz","q":"'I don't like rice' means…","opts":["Me gusta el arroz","No me gusta el arroz","Me encanta el arroz","Como arroz"],"ans":1},{"type":"fill","q":"I ___ pizza! It is my favorite!","blank":"love","hint":"Stronger than 'like'"},{"type":"quiz","q":"Which is a drink?","opts":["apple","egg","bread","juice"],"ans":2},{"type":"fill","q":"Do you like chicken? Yes, I ___ it.","blank":"like","hint":"Affirmative answer"}],"tip":"Like = me gusta. Love = me encanta. Hate = odio. I LOVE pizza! I HATE onions!","speak":["I like pizza!","I don't like salad.","Do you like chicken?","I love bananas!"]},{"n":15,"phase":1,"title":"Animals & Sounds","obj":"Name 10 animals and describe them simply.","vocab":[["Dog","Perro"],["Cat","Gato"],["Bird","Pájaro"],["Fish","Pez"],["Cow","Vaca"],["Lion","León"],["Elephant","Elefante"],["Rabbit","Conejo"],["Snake","Serpiente"],["Horse","Caballo"]],"grammar":{"rule":"'It is a ___. It is ___.' (description)","examples":["It is a dog. It is small and friendly.","It is a lion. It is big and fast.","A snake is long and thin."]},"exercises":[{"type":"quiz","q":"Which animal says 'moo'?","opts":["dog","horse","cow","cat"],"ans":2},{"type":"fill","q":"A ___ is a big animal with a long nose.","blank":"elephant","hint":"The largest land animal"},{"type":"quiz","q":"Which word describes a mouse?","opts":["big","heavy","tall","small"],"ans":3},{"type":"fill","q":"A ___ is man's best friend.","blank":"dog","hint":"Common household pet"}],"tip":"Animals that live in a house are 'pets'. Animals in the wild are 'wild animals'. The dog is my pet!","speak":["It is a cat.","The lion is big and fast.","Dogs are friendly.","I have a rabbit at home."]},{"n":16,"phase":1,"title":"Shapes & Sizes","obj":"Name 6 shapes and use big/small, long/short.","vocab":[["Circle","Círculo"],["Square","Cuadrado"],["Triangle","Triángulo"],["Rectangle","Rectángulo"],["Star","Estrella"],["Heart","Corazón"],["Big","Grande"],["Small","Pequeño"],["Long","Largo"],["Short","Corto"]],"grammar":{"rule":"'The ___ is big/small.'","examples":["The circle is big.","The triangle is small.","My pencil is long.","Her hair is short."]},"exercises":[{"type":"quiz","q":"How many sides does a triangle have?","opts":["4","2","3","5"],"ans":2},{"type":"fill","q":"A ___ has four equal sides.","blank":"square","hint":"All sides are the same length"},{"type":"quiz","q":"The opposite of 'big' is:","opts":["long","tall","small","round"],"ans":2},{"type":"fill","q":"A ruler is ___ and thin.","blank":"long","hint":"Think of the shape of a ruler"}],"tip":"Adjectives go BEFORE the noun: a BIG dog, a SMALL cat, a LONG snake.","speak":["The circle is round.","A square has four sides.","The elephant is big.","A pencil is long."]},{"n":17,"phase":1,"title":"Where I Live","obj":"Name rooms in a house and furniture.","vocab":[["House","Casa"],["Bedroom","Cuarto/Dormitorio"],["Kitchen","Cocina"],["Bathroom","Baño"],["Living room","Sala"],["Garden","Jardín"],["Bed","Cama"],["Sofa","Sofá"],["Table","Mesa"],["Window","Ventana"]],"grammar":{"rule":"'There is a ___ in the ___.'","examples":["There is a bed in the bedroom.","There is a table in the kitchen.","Is there a sofa in your living room?"]},"exercises":[{"type":"quiz","q":"Where do you sleep?","opts":["kitchen","bathroom","bedroom","garden"],"ans":2},{"type":"fill","q":"There ___ a sofa in the living room.","blank":"is","hint":"Use 'is' with a single item"},{"type":"quiz","q":"Where do you cook food?","opts":["bedroom","garden","bathroom","kitchen"],"ans":3},{"type":"fill","q":"I look out the ___.","blank":"window","hint":"You can see outside through it"}],"tip":"'There is' (singular) / 'There are' (plural): There IS a cat. There ARE two dogs.","speak":["There is a bed in my bedroom.","My kitchen is small.","The living room has a sofa.","I have a garden."]},{"n":18,"phase":1,"title":"Clothes We Wear","obj":"Name 10 clothing items and describe outfits.","vocab":[["Shirt","Camisa"],["Pants","Pantalón"],["Dress","Vestido"],["Shoes","Zapatos"],["Socks","Calcetines"],["Hat","Sombrero"],["Jacket","Chaqueta"],["Skirt","Falda"],["T-shirt","Camiseta"],["Jeans","Jeans"]],"grammar":{"rule":"'I am wearing a ___.' / 'She is wearing ___.'","examples":["I am wearing a blue shirt.","She is wearing a red dress.","He is wearing jeans and a jacket."]},"exercises":[{"type":"quiz","q":"What do you wear on your feet?","opts":["hat","shirt","shoes","jacket"],"ans":2},{"type":"fill","q":"I am ___ a white t-shirt today.","blank":"wearing","hint":"Present continuous of 'wear'"},{"type":"quiz","q":"Which is worn in cold weather?","opts":["sandals","jacket","shorts","t-shirt"],"ans":1},{"type":"fill","q":"She is wearing a blue ___. (it is not a pants)","blank":"dress","hint":"A one-piece garment"}],"tip":"'I am wearing' = ahora mismo estás usando esa ropa. It is present continuous tense!","speak":["I am wearing a shirt.","She is wearing a red dress.","What are you wearing?","I love my new jeans!"]},{"n":19,"phase":1,"title":"The Weather","obj":"Describe 6 types of weather and dress appropriately.","vocab":[["Sunny","Soleado"],["Cloudy","Nublado"],["Rainy","Lluvioso"],["Windy","Ventoso"],["Hot","Caliente/Caluroso"],["Cold","Frío"],["Snowy","Con nieve"],["Storm","Tormenta"],["Umbrella","Paraguas"],["Raincoat","Impermeable"]],"grammar":{"rule":"'It is ___ today.' / 'The weather is ___.'","examples":["It is sunny today.","The weather is cold.","It is rainy. Take your umbrella!"]},"exercises":[{"type":"quiz","q":"When it rains, you should take your:","opts":["hat","jacket","umbrella","sunglasses"],"ans":2},{"type":"fill","q":"It is ___. Wear a t-shirt! (very warm)","blank":"hot","hint":"Temperature is high"},{"type":"quiz","q":"The opposite of 'sunny' is:","opts":["windy","cloudy","hot","cold"],"ans":1},{"type":"fill","q":"It is ___ today. Put on your jacket! (temperature is low)","blank":"cold","hint":"Temperature is low"}],"tip":"Talking about weather is the most common conversation starter in English! 'It is' is ALWAYS used with weather.","speak":["It is sunny today!","The weather is cold.","It is rainy. Take your umbrella.","I love hot weather!"]},{"n":20,"phase":1,"title":"CHECKPOINT 2 – Review & Games","obj":"Consolidate lessons 11–19 through speaking and games.","vocab":[["Month","Mes"],["Season","Estación"],["Weather","Clima"],["Clothes","Ropa"],["Body","Cuerpo"],["Food","Comida"],["Animal","Animal"],["Time","Tiempo/Hora"],["Room","Cuarto"],["Shape","Forma"]],"grammar":{"rule":"Review: I am wearing, It is, There is, I like","examples":["It is hot today. I am wearing a t-shirt.","There is a cat in my house. I like cats.","My birthday is in June."]},"exercises":[{"type":"quiz","q":"'It is rainy today' — what should you take?","opts":["sunglasses","hat","umbrella","sandals"],"ans":2},{"type":"fill","q":"My birthday is ___ December.","blank":"in","hint":"Use 'in' with months"},{"type":"quiz","q":"What room do you cook in?","opts":["bedroom","bathroom","living room","kitchen"],"ans":3},{"type":"fill","q":"It is cold today. I am ___ a jacket.","blank":"wearing","hint":"Present continuous of 'wear'"}],"tip":"You now know 200+ English words! Keep reviewing and using them every day.","speak":["My birthday is in April.","It is sunny and hot today.","I am wearing jeans and a white shirt.","There is a dog in my garden."]},{"n":21,"phase":1,"title":"Action Verbs – Present Simple","obj":"Use 10 action verbs in the present simple.","vocab":[["Run","Correr"],["Jump","Saltar"],["Swim","Nadar"],["Read","Leer"],["Eat","Comer"],["Sleep","Dormir"],["Play","Jugar"],["Draw","Dibujar"],["Sing","Cantar"],["Dance","Bailar"]],"grammar":{"rule":"I/You/We/They + base verb. He/She/It + verb+S","examples":["I run every morning.","She reads every night.","They play soccer on Saturdays.","He eats rice for lunch."]},"exercises":[{"type":"quiz","q":"Which is CORRECT?","opts":["She run fast.","She runs fast.","She running fast.","She is run fast."],"ans":1},{"type":"fill","q":"He ___ soccer every day. (play)","blank":"plays","hint":"Add -s for he/she/it"},{"type":"quiz","q":"'I sleep eight hours' — what does this mean?","opts":["Yo quiero dormir","Yo dormí ocho horas","Yo duermo ocho horas","Yo voy a dormir"],"ans":2},{"type":"fill","q":"They ___ in the pool every Saturday. (swim)","blank":"swim","hint":"They = no -s needed"}],"tip":"The BIG RULE: add -S when the subject is he, she, or it! I eat → She EATS.","speak":["I run every morning.","She reads a book.","We play soccer.","He sings very well!"]},{"n":22,"phase":1,"title":"My Daily Routine – Morning","obj":"Describe a morning routine using sequence words.","vocab":[["Wake up","Despertar"],["Brush teeth","Cepillarse los dientes"],["Wash face","Lavarse la cara"],["Get dressed","Vestirse"],["Eat breakfast","Desayunar"],["Go to school","Ir a la escuela"],["First","Primero"],["Then","Luego"],["After that","Después de eso"],["Finally","Finalmente"]],"grammar":{"rule":"Sequence words: First, Then, After that, Finally","examples":["First, I wake up at 6.","Then, I brush my teeth.","After that, I eat breakfast.","Finally, I go to school."]},"exercises":[{"type":"quiz","q":"Which word means 'primero'?","opts":["then","finally","first","after that"],"ans":2},{"type":"fill","q":"___, I wake up. Then I brush my teeth.","blank":"First","hint":"The first sequence word"},{"type":"quiz","q":"What is the LAST step in the morning?","opts":["wake up","eat breakfast","brush teeth","go to school"],"ans":3},{"type":"fill","q":"After that, I ___. (eat in the morning)","blank":"eat breakfast","hint":"Morning meal"}],"tip":"Sequence words make your speaking sound natural and organized! Practice using them every day.","speak":["First, I wake up.","Then, I brush my teeth.","After that, I eat breakfast.","Finally, I go to school."]},{"n":23,"phase":1,"title":"My Daily Routine – Afternoon","obj":"Extend routine descriptions to afternoon and evening.","vocab":[["Come home","Llegar a casa"],["Do homework","Hacer tarea"],["Watch TV","Ver televisión"],["Play outside","Jugar afuera"],["Have dinner","Cenar"],["Take a shower","Ducharse"],["Go to bed","Irse a dormir"],["In the afternoon","En la tarde"],["In the evening","En la noche"],["At night","De noche"]],"grammar":{"rule":"Frequency adverbs: always, usually, sometimes, never","examples":["I always do my homework.","I usually watch TV after school.","I sometimes play outside.","I never go to bed late."]},"exercises":[{"type":"quiz","q":"'I always do my homework' means:","opts":["A veces hago tarea","Nunca hago tarea","Siempre hago tarea","Usualmente hago tarea"],"ans":2},{"type":"fill","q":"I ___ watch TV after school. (it happens most of the time)","blank":"usually","hint":"Most of the time but not always"},{"type":"quiz","q":"When is 'in the evening'?","opts":["morning","afternoon","lunchtime","night"],"ans":3},{"type":"fill","q":"I go to ___ at 10pm.","blank":"bed","hint":"Where you sleep"}],"tip":"Word order: I ALWAYS eat dinner. NOT: I eat always dinner. Frequency adverbs go BEFORE the main verb!","speak":["I usually come home at 3pm.","I always do my homework.","I sometimes watch TV.","I go to bed at ten o'clock."]},{"n":24,"phase":1,"title":"Can You…? Abilities","obj":"Express abilities using 'can' and 'can't'.","vocab":[["Can","Poder/Saber"],["Can't","No poder/No saber"],["Ride a bike","Andar en bici"],["Cook","Cocinar"],["Draw","Dibujar"],["Speak English","Hablar inglés"],["Play soccer","Jugar fútbol"],["Swim","Nadar"],["Drive","Manejar"],["Dance","Bailar"]],"grammar":{"rule":"Can + base verb (ALL subjects, no changes)","examples":["I can swim.","She can dance very well.","He can't cook.","Can you speak English? Yes, I can!"]},"exercises":[{"type":"quiz","q":"Which is CORRECT?","opts":["She cans swim.","She can swims.","She can swim.","She can to swim."],"ans":2},{"type":"fill","q":"I ___ ride a bike. (I know how)","blank":"can","hint":"Ability in affirmative"},{"type":"quiz","q":"'I can't cook' means:","opts":["Puedo cocinar","Voy a cocinar","Quiero cocinar","No puedo cocinar"],"ans":3},{"type":"fill","q":"___ you play soccer? (asking about ability)","blank":"Can","hint":"Question form of 'can'"}],"tip":"CAN never changes! I can, you can, she can, they can. NEVER 'she cans'!","speak":["I can swim very well.","Can you dance?","She can't drive.","Yes, I can! / No, I can't."]},{"n":25,"phase":1,"title":"Where Is It? Prepositions","obj":"Use 6 prepositions of place correctly.","vocab":[["In","En (dentro de)"],["On","En (encima de)"],["Under","Debajo de"],["Next to","Al lado de"],["Behind","Detrás de"],["In front of","En frente de"],["Between","Entre"],["Near","Cerca de"],["Far","Lejos de"],["Where?","¿Dónde?"]],"grammar":{"rule":"'The ___ is ___ the ___.'","examples":["The book is on the table.","The cat is under the bed.","The school is next to the park.","My bag is behind the door."]},"exercises":[{"type":"quiz","q":"The cat is ___ the box. (inside)","opts":["on","under","in","next to"],"ans":2},{"type":"fill","q":"The book is ___ the table. (on top)","blank":"on","hint":"Preposition for surfaces"},{"type":"quiz","q":"'The park is between the school and the hospital' means:","opts":["El parque está detrás del hospital","El parque está cerca de la escuela","El parque está entre la escuela y el hospital","El parque está frente al hospital"],"ans":2},{"type":"fill","q":"The dog is ___ the sofa. (it is sleeping under)","blank":"under","hint":"Below the sofa"}],"tip":"Think of a box: IN the box, ON the box, UNDER the box, NEXT TO the box, BEHIND the box.","speak":["The book is on the table.","The cat is under the bed.","My school is next to a park.","Where is my bag? It is behind the door!"]},{"n":26,"phase":1,"title":"Going Places – Transport","obj":"Name transport types and say how you travel.","vocab":[["Bus","Autobús"],["Car","Carro"],["Bicycle","Bicicleta"],["Plane","Avión"],["Train","Tren"],["Boat","Bote/Barco"],["Walk","Caminar"],["Drive","Manejar"],["Fly","Volar"],["Ride","Montar/Ir"]],"grammar":{"rule":"'I go to ___ by ___.' / 'I take the ___.'","examples":["I go to school by bus.","She goes to work by car.","I take the train to the city.","We go to the beach by plane."]},"exercises":[{"type":"quiz","q":"'I go to school by bus' means:","opts":["Voy a la escuela a pie","Voy a la escuela en bus","Voy al trabajo en bus","Voy a la escuela en carro"],"ans":1},{"type":"fill","q":"I go to school ___ bus.","blank":"by","hint":"Preposition used with transport"},{"type":"quiz","q":"Which transport flies?","opts":["boat","bicycle","train","plane"],"ans":3},{"type":"fill","q":"She ___ a car to work every day. (drive)","blank":"drives","hint":"He/she = add -s"}],"tip":"BY is always used with transport: by car, by bus, by plane. But we say 'ON FOOT' (not 'by foot')!","speak":["I go to school by bus.","She drives a car.","We take the plane to travel.","How do you go to school?"]},{"n":27,"phase":1,"title":"At the Shop – Buying Things","obj":"Role-play a shopping interaction using prices.","vocab":[["Shop","Tienda"],["Buy","Comprar"],["Sell","Vender"],["Pay","Pagar"],["Price","Precio"],["How much is…?","¿Cuánto cuesta…?"],["It costs","Cuesta"],["Expensive","Caro"],["Cheap","Barato"],["Receipt","Recibo"]],"grammar":{"rule":"'How much is the ___?' / 'It costs ___.'","examples":["How much is the shirt?","It costs fifteen dollars.","That is too expensive!","That is very cheap!"]},"exercises":[{"type":"quiz","q":"How do you ask for the price?","opts":["What is it?","How many is it?","How much is it?","Where is it?"],"ans":2},{"type":"fill","q":"It ___ twenty dollars.","blank":"costs","hint":"Verb to express price"},{"type":"quiz","q":"Something 'expensive' is:","opts":["muy barato","de color caro","muy caro","en oferta"],"ans":2},{"type":"fill","q":"How much ___ the shoes?","blank":"are","hint":"Shoes = plural, use 'are'"}],"tip":"Is = singular (How much IS the shirt?). Are = plural (How much ARE the shoes?)","speak":["How much is the shirt?","It costs ten dollars.","That is expensive!","I'll take it, please."]},{"n":28,"phase":1,"title":"Jobs & People","obj":"Name 10 jobs and say what people do.","vocab":[["Teacher","Maestro/a"],["Doctor","Doctor/a"],["Police officer","Policía"],["Chef","Chef/Cocinero"],["Farmer","Agricultor"],["Engineer","Ingeniero/a"],["Nurse","Enfermero/a"],["Driver","Chofer"],["Student","Estudiante"],["Artist","Artista"]],"grammar":{"rule":"'She is a ___. She ___s every day.'","examples":["She is a teacher. She teaches every day.","He is a chef. He cooks delicious food.","They are students. They study hard."]},"exercises":[{"type":"quiz","q":"A person who works in a hospital and helps sick people is a:","opts":["teacher","driver","doctor","farmer"],"ans":2},{"type":"fill","q":"She is a ___. She teaches children.","blank":"teacher","hint":"Person who teaches"},{"type":"quiz","q":"'He is an engineer' means:","opts":["Él es cocinero","Él es médico","Él es ingeniero","Él es maestro"],"ans":2},{"type":"fill","q":"I am a ___. I study every day.","blank":"student","hint":"What are you?"}],"tip":"Use 'a' before jobs starting with consonants: a teacher, a doctor. Use 'an' before vowels: an artist, an engineer.","speak":["She is a doctor.","He is a chef. He cooks great food.","I want to be an engineer.","What is your job?"]},{"n":29,"phase":1,"title":"Left, Right & Directions","obj":"Give and follow basic directions.","vocab":[["Left","Izquierda"],["Right","Derecha"],["Straight ahead","Recto/Derecho"],["Turn","Girar/Doblar"],["Stop","Parar"],["Go","Ir"],["Corner","Esquina"],["Traffic light","Semáforo"],["Street","Calle"],["Block","Cuadra"]],"grammar":{"rule":"Imperative mood for directions: 'Turn left. Go straight.'","examples":["Turn left at the corner.","Go straight for two blocks.","Stop at the traffic light.","Turn right on Main Street."]},"exercises":[{"type":"quiz","q":"'Turn left' means:","opts":["Siga recto","Doble a la derecha","Doble a la izquierda","Pare"],"ans":2},{"type":"fill","q":"Go ___ for two blocks, then turn right.","blank":"straight","hint":"Continue in the same direction"},{"type":"quiz","q":"'Stop at the traffic light' — when do you stop?","opts":["At the corner","At the traffic light","After the park","At the school"],"ans":1},{"type":"fill","q":"Turn ___ at the next corner. (to the right)","blank":"right","hint":"The opposite of left"}],"tip":"To remember LEFT and RIGHT: hold up both hands. The LEFT hand makes an 'L' shape!","speak":["Turn left at the corner.","Go straight for one block.","Stop at the traffic light.","Turn right and you will see the school."]},{"n":30,"phase":1,"title":"CHECKPOINT 3 – Mid-Beginner Review","obj":"Major review of all Beginner content with assessment.","vocab":[["Achievement","Logro"],["Progress","Progreso"],["Review","Repasar"],["Assessment","Evaluación"],["Score","Puntaje"],["Pass","Pasar/Aprobar"],["Improve","Mejorar"],["Fluent","Fluido"],["Confidence","Confianza"],["Goal","Meta"]],"grammar":{"rule":"All beginner structures consolidated","examples":["I can speak a little English!","First I wake up, then I eat breakfast.","Turn left at the corner and go straight."]},"exercises":[{"type":"quiz","q":"'Go straight for two blocks, then turn left' — you are going:","opts":["right then left","straight then left","left then straight","straight only"],"ans":1},{"type":"fill","q":"I ___ swim and I ___ fly a plane. (ability/inability)","blank":"can / can't","hint":"can = sí puedo, can't = no puedo"},{"type":"quiz","q":"'She teaches English' — what is her job?","opts":["doctor","driver","teacher","nurse"],"ans":2},{"type":"fill","q":"The cat is ___ the table. (below)","blank":"under","hint":"Preposition meaning 'debajo de'"}],"tip":"Congratulations on reaching Lesson 30! You have learned an incredible amount of English. Keep going!","speak":["I can speak some English now!","My name is ___, I am ___ years old.","I go to school by bus.","Turn left and go straight."]}];
const KD='r360_p11B_done',KS='r360_p11B_sc';
let ci=0;
const done=new Set(JSON.parse(localStorage.getItem(KD)||'[]'));
const sc=JSON.parse(localStorage.getItem(KS)||'{}');
function save(){localStorage.setItem(KD,JSON.stringify([...done]));localStorage.setItem(KS,JSON.stringify(sc));}
function isCk(t){return /CHECKPOINT|FINAL|EVALUATION|GRADUATION|PLACEMENT/.test(t);}
function bSB(){
  const ll=document.getElementById('ll');ll.innerHTML='';
  LS.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='li'+(i===ci?' active':'')+(done.has(i)?' done':'')+(isCk(l.title)?' ckpt':'');
    d.onclick=()=>go(i);
    d.innerHTML=`<div class="ln">${done.has(i)?'✓':l.n}</div><div class="lt">${l.title}</div>`;
    ll.appendChild(d);
  });
  const pct=Math.round(done.size/LS.length*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pl').textContent=done.size+' / '+LS.length+' completadas';
  ll.querySelector('.active')?.scrollIntoView({block:'nearest'});
}
function nav(d){const n=ci+d;if(n>=0&&n<LS.length)go(n);}
function go(i){ci=i;render();bSB();window.scrollTo(0,0);}
function sp(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.88;u.pitch=1.05;window.speechSynthesis.speak(u);return u;
}
function tog(id){const b=document.getElementById('sb_'+id),t=document.getElementById('st_'+id);b.classList.toggle('col');t.textContent=b.classList.contains('col')?'▼':'▲';}
function qAns(eid,ch,ans){
  document.querySelectorAll('[id^="'+eid+'_o"]').forEach((b,i)=>{b.disabled=true;if(i===ans)b.classList.add('ca');if(i===ch&&i!==ans)b.classList.add('wa');});
  const fb=document.getElementById(eid+'_fb'),wrap=document.getElementById(eid+'_w');
  const ei=parseInt(eid.split('_')[2]);
  if(!sc[ci])sc[ci]={c:0,t:LS[ci].exercises.length,a:0};
  if(sc[ci].a<=ei){
    sc[ci].a=ei+1;
    if(ch===ans){sc[ci].c++;fb.textContent='✓ ¡Correcto!';fb.className='fb show ok';wrap.classList.add('ok');}
    else{fb.textContent='✗ Respuesta: '+LS[ci].exercises[ei].opts[ans];fb.className='fb show no';wrap.classList.add('no');}
    uSB();save();
  }
}
function chkF(eid,ans){
  const inp=document.getElementById(eid+'_i'),fb=document.getElementById(eid+'_fb'),wrap=document.getElementById(eid+'_w');
  const v=inp.value.trim().toLowerCase(),a=String(ans).toLowerCase();
  if(!v)return;
  const ei=parseInt(eid.split('_')[2]);
  if(!sc[ci])sc[ci]={c:0,t:LS[ci].exercises.length,a:0};
  if(sc[ci].a<=ei){
    sc[ci].a=ei+1;inp.disabled=true;
    const flex=['(any letter)','(your age)',"(today's day)",'(your day)','(your name)'];
    const ok=flex.some(f=>a.includes(f))||v===a||v.includes(a)||a.includes(v);
    if(ok){inp.classList.add('ok');fb.textContent='✓ ¡Correcto! ¡Bien hecho!';fb.className='fb show ok';wrap.classList.add('ok');sc[ci].c++;}
    else{inp.classList.add('no');fb.textContent='✗ Respuesta: '+ans;fb.className='fb show no';wrap.classList.add('no');}
    uSB();save();
  }
}
function uSB(){
  const s=sc[ci]||{c:0,t:LS[ci].exercises.length};
  const pct=Math.round(s.c/s.t*100);
  const sv=document.querySelector('.sv'),sf=document.querySelector('.sf');
  if(sv)sv.textContent=s.c+'/'+s.t;if(sf)sf.style.width=pct+'%';
}
function rst(){delete sc[ci];done.delete(ci);save();render();bSB();}
function markDone(){done.add(ci);save();bSB();if(ci<LS.length-1)setTimeout(()=>nav(1),300);else document.getElementById('db').textContent='🎉 ¡Unidad Completada!';}
function spP(btn,txt){btn.classList.add('pl');const u=sp(txt);if(u)u.onend=()=>btn.classList.remove('pl');setTimeout(()=>btn.classList.remove('pl'),5000);}
function render(){
  const l=LS[ci];
  document.getElementById('bg').textContent='Lección '+l.n;
  document.getElementById('pb').disabled=ci===0;
  document.getElementById('nb').disabled=ci===LS.length-1;
  const s=sc[ci]||{c:0,t:l.exercises.length};
  const pct=Math.round(s.c/s.t*100);
  let h=`<div class="lh"><div class="tag">Fase 1 · Lección ${l.n}</div><h1 class="t">${l.title}</h1><p class="obj">🎯 ${l.obj}</p></div>`;
  h+=`<div class="sbar"><div><div class="slb">Ejercicios</div><div class="sv">${s.c}/${s.t}</div></div><div class="st"><div class="sf" style="width:${pct}%"></div></div><button class="rst" onclick="rst()">↺ Reiniciar</button></div>`;
  // Vocabulary
  h+=`<div class="sec"><div class="sh2" onclick="tog('v')"><div class="sico">📚</div><span class="slbl">Vocabulario (${l.vocab.length} palabras)</span><span class="stog" id="st_v">▲</span></div><div class="sbody" id="sb_v"><div class="vg">`;
  l.vocab.forEach(([en,es])=>h+=`<div class="vc" onclick="sp('${en.replace(/'/g,"\\'")}')"><div class="ven">${en}</div><div class="ves">${es}</div><div class="vsic">🔊 toca para escuchar</div></div>`);
  h+=`</div></div></div>`;
  // Grammar
  h+=`<div class="sec"><div class="sh2" onclick="tog('g')"><div class="sico">📐</div><span class="slbl">Gramática</span><span class="stog" id="st_g">▲</span></div><div class="sbody" id="sb_g"><div class="grule"><div class="grl">Regla</div><div class="grt">${l.grammar.rule}</div></div><ul class="el">`;
  l.grammar.examples.forEach(ex=>h+=`<li class="ei"><span class="edot">▸</span><span>${ex}</span><button class="esp" onclick="sp('${ex.replace(/'/g,"\\'")}')">🔊</button></li>`);
  h+=`</ul></div></div>`;
  // Exercises
  h+=`<div class="sec"><div class="sh2" onclick="tog('e')"><div class="sico">✏️</div><span class="slbl">Ejercicios</span><span class="stog" id="st_e">▲</span></div><div class="sbody" id="sb_e">`;
  l.exercises.forEach((ex,ei)=>{
    const eid=`ex_${ci}_${ei}`;
    if(ex.type==='quiz'){
      h+=`<div class="ex" id="${eid}_w"><div class="exn">Pregunta ${ei+1}</div><div class="exq">${ex.q}</div><div class="opts">`;
      ex.opts.forEach((o,oi)=>h+=`<button class="ob" id="${eid}_o${oi}" onclick="qAns('${eid}',${oi},${ex.ans})">${o}</button>`);
      h+=`</div><div class="fb" id="${eid}_fb"></div></div>`;
    }else{
      h+=`<div class="ex" id="${eid}_w"><div class="exn">Pregunta ${ei+1}</div><div class="exq">${ex.q}</div><div class="fw"><input class="fi" id="${eid}_i" placeholder="Escribe tu respuesta…" onkeydown="if(event.key==='Enter')chkF('${eid}',${JSON.stringify(ex.blank)})"><button class="cb" onclick="chkF('${eid}',${JSON.stringify(ex.blank)})">Verificar</button></div><div class="fh">💡 ${ex.hint}</div><div class="fb" id="${eid}_fb"></div></div>`;
    }
  });
  h+=`</div></div>`;
  // Speaking
  h+=`<div class="sec"><div class="sh2" onclick="tog('s')"><div class="sico">🎤</div><span class="slbl">Práctica Oral</span><span class="stog" id="st_s">▲</span></div><div class="sbody" id="sb_s"><div class="spg">`;
  l.speak.forEach(s2=>h+=`<div class="spr"><span class="spt">${s2}</span><button class="spb" onclick="spP(this,'${s2.replace(/'/g,"\\'")}')">🔊 Escucha y Repite</button></div>`);
  h+=`</div></div></div>`;
  // Tip
  h+=`<div class="tip"><div class="tipico">💡</div><div class="tiptxt">${l.tip}</div></div>`;
  // Complete
  h+=`<div style="margin-top:22px;text-align:center;"><button id="db" onclick="markDone()" style="padding:13px 32px;background:var(--brand);border:none;border-radius:9px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;">${done.has(ci)?'✓ Completada — Siguiente →':'✅ Marcar como Completada'}</button></div>`;
  document.getElementById('mc').innerHTML=h;
}
bSB();render();
</script>
